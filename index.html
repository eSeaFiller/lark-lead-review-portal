<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lark Lead Review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Lark Lead Review</p>
        <h1>Partner lead review</h1>
      </div>
      <button id="refreshTop" class="secondary" type="button">Refresh</button>
    </header>

    <main>
      <div class="toolbar panel">
        <div>
          <h2>Review queue</h2>
          <p id="leadSummary" class="muted">Loading leads...</p>
        </div>
        <div class="toolbar-actions">
          <select id="statusFilter" aria-label="Filter status">
            <option value="all">All statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <button id="refreshLeads" class="secondary" type="button">Refresh</button>
          <button id="exportApproved" class="primary" type="button">Export approved Excel</button>
        </div>
      </div>

      <div id="systemNotice" class="notice hidden"></div>
      <div id="exportResult" class="notice hidden"></div>

      <div class="table-wrap panel">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Partner</th>
              <th>Lead</th>
              <th>Company</th>
              <th>Country</th>
              <th>Role</th>
              <th>Warnings</th>
              <th>Submitted</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="leadRows">
            <tr>
              <td colspan="9" class="empty-state">No leads loaded.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
